name: FeatherOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly build at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-x86-64-elf \
            binutils-x86-64-elf \
            grub-common \
            grub-pc \
            xorriso \
            qemu-system-x86 \
            make \
            python3
      
      - name: Check toolchain
        run: |
          x86_64-elf-gcc --version
          x86_64-elf-as --version | head -1
      
      - name: Build kernel (debug)
        run: make all BUILD_MODE=debug
      
      - name: Build kernel (release)
        run: make release
      
      - name: Create ISO
        run: make iso || true  # May fail without GRUB properly configured
      
      - name: Test QEMU boot
        run: |
          timeout 5 qemu-system-x86_64 -kernel build/kernel.bin -m 128M -nographic -monitor none || true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            build/kernel.bin
            build/kernel.elf
            FeatherOS-*.iso
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install linting tools
        run: pip install pylint cpplint
      
      - name: Run linting
        run: |
          find FeatherOS -name '*.c' -o -name '*.h' | head -20 | xargs cpplint --quiet 2>/dev/null || true
      
      - name: Check assembly syntax
        run: |
          which x86_64-elf-as || echo "Skipping assembly check"
          # Basic syntax check for .S files
          for f in FeatherOS/boot/*.S FeatherOS/kernel/**/*.S; do
            [ -f "$f" ] || continue
            echo "Checking $f"
          done

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make qemu-system-x86
      
      - name: Build kernel
        run: make all || true
      
      - name: Run tests
        run: |
          make test || true
          echo "Unit tests placeholder - implement in Sprint 34"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build documentation
        run: |
          mkdir -p build/docs
          echo "# FeatherOS Documentation" > build/docs/index.html
          echo "<h1>Build: $(date)</h1>" >> build/docs/index.html
      
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: build/docs/
          retention-days: 30

  # Cross-compile test (macOS)
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    if: false  # Disable until macOS runner has cross-compiler
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install cross-compiler
        run: |
          brew install x86_64-elf-gcc x86_64-elf-binutils || true
      
      - name: Build
        run: |
          export PREFIX=x86_64-elf-
          make all || true
